services:
  # 1. Database for Auth Microservice
  auth-db:
    image: postgres:15-alpine
    container_name: syncspace-auth-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: syncspace_auth
    ports:
      - "5432:5432" # Maps container port 5432 to your local machine port 5432
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

  # 2. Separate Database for Workspace Microservice
  workspace-db:
    image: postgres:15-alpine
    container_name: syncspace-workspace-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: syncspace_workspace
    ports:
      - "5433:5432" # FIX: Maps container port 5432 to your local machine port 5433
    volumes:
      - workspace_postgres_data:/var/lib/postgresql/data

  task-db:
    image: postgres:15-alpine
    container_name: syncspace-task-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: syncspace_task
    ports:
      - "5434:5432"
    volumes:
      - task_postgres_data:/var/lib/postgresql/data

# Separate data volumes so their data doesn't get corrupted or mixed up
volumes:
  auth_postgres_data:
  workspace_postgres_data:
  task_postgres_data: